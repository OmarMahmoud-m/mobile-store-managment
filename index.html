<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  
  <link rel="stylesheet" href="./css/all.min.css">
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  
</head>
<body>
  
  
  <section>
  <div class="w-75 mx-auto ">
    <h1 class="mb-3 text-center">Store Managment system</h1>

    <div class="form-floating mb-3" id="formStart">
      <input type="text" class="form-control" id="ProductName" placeholder="Product Name" oninput="validate(this)">
      <label for="ProductName">Prodcut Name</label>

      <div class="valid-feedback">
        Looks good ✔
      </div>

      <div class="invalid-feedback">
        Name must be 3–15 letters 
      </div>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="ProductPrice" placeholder="Product Price" oninput="validate(this)">
      <label for="ProductPrice">Product Price</label>

      <div class="valid-feedback">
        Valid price ✔
      </div>
      <div class="invalid-feedback">
        Price must be between 2000 and 100000
      </div>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="ProductCategory" placeholder="Product Category">
      <label for="ProductCategory">Product Category</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="ProductDescription" placeholder="Product Description">
      <label for="ProductDescription">Product Description</label>
    </div>

    <div class="form-floating mb-3">
      <input type="file" class="form-control" id="ProductImage" placeholder="Product Image">
      <label for="ProductImage">Product Image</label>
    </div>

    <button class="btn btn-primary" onclick="addProduct()" id="addBtn">Add product</button>
    <button class="btn btn-success d-none" onclick="save()" id="saveBtn">Save changes</button>
    
  </div>
  
  </section>

  <section class="mt-3 mx-auto w-75">



    <div class="row" id="rowData">
      
    </div>
  </section>
  


  <script src="./js/bootstrap.bundle.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
